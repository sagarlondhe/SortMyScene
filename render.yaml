services:
  - type: web
    name: Event-Ticket-Booking-System
    env: node
    plan: free
    region: oregon

    # Explicitly install devDependencies first, as NODE_ENV=production
    # would otherwise prevent npm from installing Vite/Tailwind in workspaces.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: NODE_VERSION
        value: 20

      - key: MONGODB_URI
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRES_IN
        value: 24h

      - key: RESERVATION_DURATION_MINUTES
        value: "10"

      - key: CLIENT_URL
        fromService:
          type: web
          name: Event-Ticket-Booking-System
          property: host